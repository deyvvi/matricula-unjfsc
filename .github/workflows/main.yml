name: ActualizacionAutomatica

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerias
        run: |
          pip install requests beautifulsoup4 pdfplumber pandas xlsxwriter

      - name: Correr Scraper
        run: python main.py

      - name: Guardar Resultados en el Repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html lista_mat_sis.xlsx
          git commit -m "Actualizacion automatica $(date)" || exit 0
          git push